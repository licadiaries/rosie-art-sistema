<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #ffe4ec, #ffd6e0);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 300px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

input {
  width: 95%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
}

.login { background: #ff69b4; color: white; }
.cadastro { background: #ffb6c1; }
</style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">

  <button class="login" onclick="login()">Entrar</button>
  <button class="cadastro" onclick="window.location.href='cadastro.html'">
    Cadastrar Usuário
  </button>
</div>

<script>
const API = "https://69bde36b17c3d7d97790bff0.mockapi.io/usuarios";

async function login() {
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  let res = await fetch(API);
  let usuarios = await res.json();

  let user = usuarios.find(u => u.email === email && u.senha === senha);

  if(user){
    localStorage.setItem("user", JSON.stringify(user));
    window.location.href = "index.html";
  } else {
    alert("Login inválido!");
  }
}
</script>

</body>
</html>
