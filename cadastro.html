<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro | Rosie Art</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #ffe4ec, #ffd6e0);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

h2 {
  color: #ff69b4;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
  outline: none;
}

button {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
  font-weight: bold;
}

.cadastro {
  background: linear-gradient(90deg,#ff69b4,#ff85c1);
  color: white;
}

.voltar {
  background: #ffe4ec;
  color: #ff69b4;
}
</style>
</head>

<body>

<div class="box">

<h2>Cadastro 👤</h2>

<input type="text" id="nome" placeholder="Nome">
<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">

<button class="cadastro" onclick="cadastrar()">Criar conta</button>
<button class="voltar" onclick="window.location.href='login.html'">Voltar</button>

</div>

<script>
const API = "https://69bde36b17c3d7d97790bff0.mockapi.io/usuarios";

async function cadastrar() {

let nome = document.getElementById("nome").value;
let email = document.getElementById("email").value;
let senha = document.getElementById("senha").value;

if(!nome || !email || !senha){
alert("Preenche tudo!");
return;
}

let res = await fetch(API);
let usuarios = await res.json();

let existe = usuarios.find(u => u.email === email);

if(existe){
alert("Esse email já existe!");
return;
}

await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
nome,
email,
senha,
role:"user"
})
});

alert("Conta criada com sucesso 💖");
window.location.href="login.html";
}
</script>

</body>
</html>
