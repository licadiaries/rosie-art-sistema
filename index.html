<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login | Rosie Art</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #ffe4ec, #ffd6e0);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

h2 {
  color: #ff69b4;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
  outline: none;
}

button {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
  font-weight: bold;
}

.login {
  background: linear-gradient(90deg,#ff69b4,#ff85c1);
  color: white;
}

.cadastro {
  background: #ffe4ec;
  color: #ff69b4;
}
</style>
</head>

<body>

<div class="box">

<h2>Rosie Art 💖</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">

<button class="login" onclick="login()">Entrar</button>
<button class="cadastro" onclick="window.location.href='cadastro.html'">
Cadastrar
</button>

</div>

<script>
const API = "https://69bde36b17c3d7d97790bff0.mockapi.io/usuarios";

async function login(){

let email = document.getElementById("email").value;
let senha = document.getElementById("senha").value;

let res = await fetch(API);
let usuarios = await res.json();

let user = usuarios.find(u => u.email === email && u.senha === senha);

if(user){
localStorage.setItem("user", JSON.stringify(user));
window.location.href = "home.html";
} else {
alert("Email ou senha inválidos");
}

}
</script>

</body>
</html>
