<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sucesso | Rosie Art</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#fff0f5,#ffe4ec);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD CENTRAL */
.card{
background:white;
padding:35px 25px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.10);
text-align:center;
max-width:320px;
width:90%;
}

/* ÍCONE */
.icon{
font-size:40px;
margin-bottom:10px;
}

/* TEXTO */
h2{
margin:10px 0;
color:#ff69b4;
font-size:20px;
}

/* SUB */
p{
color:#666;
font-size:13px;
margin-bottom:20px;
}

/* BOTÃO */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff69b4,#ff85c1);
color:white;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
}
</style>
</head>

<body>

<div class="card">

<div class="icon">✔</div>

<h2>Feedback enviado com sucesso</h2>

<p>Obrigado pela sua contribuição 💖</p>

<button onclick="window.location.href='home.html'">
Voltar para Home
</button>

</div>

</body>
</html>
